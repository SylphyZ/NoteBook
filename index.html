<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习笔记</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      color: #e0e0e0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #a8d8ea;
    }

    header a {
      color: #a8d8ea;
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid #a8d8ea44;
      padding: 4px 12px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    header a:hover {
      background: #a8d8ea22;
    }

    #pdf-container {
      flex: 1;
      width: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* 移动端提示 */
    #mobile-tip {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #e0e0e0;
      text-align: center;
      padding: 32px;
      gap: 16px;
    }

    #mobile-tip p { font-size: 1rem; color: #aaa; }

    #mobile-tip a {
      background: #a8d8ea;
      color: #1a1a2e;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      iframe { display: none; }
      #mobile-tip { display: flex; }
    }
  </style>
</head>
<body>

<header>
  <h1>📖 学习笔记</h1>
  <a href="publish.pdf" download>⬇ 下载 PDF</a>
</header>

<div id="pdf-container">
  <iframe src="publish.pdf#toolbar=1&navpanes=1&scrollbar=1" title="学习笔记"></iframe>

  <div id="mobile-tip">
    <p>手机浏览器不支持内嵌 PDF 预览</p>
    <a href="publish.pdf">点击打开 PDF</a>
  </div>
</div>

</body>
</html>
